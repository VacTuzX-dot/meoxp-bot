server:
  port: 2333
  address: 0.0.0.0
  http2:
    enabled: false

plugins:
  youtube:
    enabled: true
    allowSearch: true
    allowDirectVideoIds: true
    allowDirectPlaylistIds: true
    clients:
      - MUSIC
      - TVHTML5EMBEDDED
      - IOS
    skipTrackOnError: true

lavalink:
  plugins:
    - dependency: "dev.lavalink.youtube:youtube-plugin:1.16.0"
      snapshot: false
  server:
    password: ${LAVALINK_SERVER_PASSWORD}
    sources:
      youtube: false
      bandcamp: false
      soundcloud: true
      twitch: false
      vimeo: false
      http: false
      local: false
    filters:
      volume: true
      equalizer: true
      karaoke: true
      timescale: true
      tremolo: true
      vibrato: true
      distortion: true
      rotation: true
      channelMix: true
      lowPass: true
    bufferDurationMs: 400
    frameBufferDurationMs: 3000
    youtubePlaylistLoadLimit: 10
    playerUpdateInterval: 10
    youtubeSearchEnabled: true
    soundcloudSearchEnabled: true
    gc-warnings: true
    trackStuckThresholdMs: 10000
    resamplingQuality: LOW
    opusEncodingQuality: 5
    useSeekGhosting: true

logging:
  file:
    path: ./logs/
  level:
    root: WARN
    lavalink: INFO

  logback:
    rollingpolicy:
      max-file-size: 5MB
      max-history: 3
