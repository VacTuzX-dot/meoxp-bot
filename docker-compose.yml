services:
  discord-bot:
    build: .
    container_name: meoxp-discord-bot
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "4444:80"
      - "4000:4000"
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M
    networks:
      - default
      - lavalink_lavalink-net
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:4000/api/health').then(r => r.status < 400 ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

  dashboard:
    build:
      context: ./dashboard
      args:
        # NEXT_PUBLIC_ vars must be set at build time for Next.js
        # This is the external URL that browser uses to access bot API
        NEXT_PUBLIC_BOT_API_URL: https://botapi.meo.in.th
    container_name: meoxp-dashboard
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - BOT_API_URL=http://discord-bot:4000
    env_file:
      - ./dashboard/.env
    depends_on:
      discord-bot:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://localhost:3000').then(r => r.status < 400 ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

networks:
  lavalink_lavalink-net:
    external: true
