name: CI and Deploy meoxp-bot

on:
  pull_request:
    branches:
      - main
      - master
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install Dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build and Typecheck
        run: pnpm run build

      # Since 'npm test' doesn't exist yet, we only run build/typecheck as our QA checks per project constraints.

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: >-
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main')
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Verify runner DNS connectivity
        shell: bash
        run: |
          set -euo pipefail

          for host in github.com api.github.com pkgs.tailscale.com; do
            resolved=false

            for attempt in {1..5}; do
              if getent ahosts "$host" >/dev/null 2>&1; then
                echo "Resolved $host on attempt $attempt"
                resolved=true
                break
              fi

              echo "Attempt $attempt/5 failed to resolve $host; retrying in 5s..."
              sleep 5
            done

            if [ "$resolved" != true ]; then
              echo "::error::Failed to resolve $host after 5 attempts."
              echo "Current resolver configuration:"
              cat /etc/resolv.conf || true
              exit 1
            fi
          done

      - name: Connect to Tailnet
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:cicd

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HOST_IP }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/meoxp-bot
            # Fetch latest code
            git pull origin main
            
            # Use fixed tag for the project
            export TAG=meoxpbot
            echo "Starting deployment for tag: $TAG"
            
            # 1. Explicitly build the image first to stabilize tags and minimize downtime
            echo "Building new project images..."
            docker compose build
            
            # 2. Identify and stop old project containers safely using label filtering
            echo "Stopping old project containers..."
            docker ps -q --filter "label=com.meoxp.bot.project=meoxp-bot" | xargs -r docker stop
            docker ps -a -q --filter "label=com.meoxp.bot.project=meoxp-bot" | xargs -r docker rm
            
            # 3. Redeploy with the fixed tag
            # We retain --force-recreate --build to ensure final state meets expectations perfectly
            docker compose up -d --force-recreate --build
            
            # 4. Cleanup dangling project images safely
            # Prevents disk bloat while protecting unrelated system images
            echo "Pruning dangling project images..."
            docker image prune -f --filter "label=com.meoxp.bot.project=meoxp-bot" --filter "dangling=true"
            
            echo "Deployment completed successfully for tag: $TAG"
