name: CI and Deploy meoxp-bot

on:
  pull_request:
    branches:
      - main
      - master
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Setup pnpm via Corepack
        shell: bash
        run: |
          corepack enable
          corepack prepare pnpm@9.15.4 --activate

      - name: Install Dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build and Typecheck
        run: pnpm run build

      # Since 'npm test' doesn't exist yet, we only run build/typecheck as our QA checks per project constraints.

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: >-
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main')
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Verify runner DNS connectivity
        shell: bash
        run: |
          set -euo pipefail

          for host in github.com api.github.com pkgs.tailscale.com; do
            resolved=false

            for attempt in {1..5}; do
              if getent ahosts "$host" >/dev/null 2>&1; then
                echo "Resolved $host on attempt $attempt"
                resolved=true
                break
              fi

              echo "Attempt $attempt/5 failed to resolve $host; retrying in 5s..."
              sleep 5
            done

            if [ "$resolved" != true ]; then
              echo "::error::Failed to resolve $host after 5 attempts."
              echo "Current resolver configuration:"
              cat /etc/resolv.conf || true
              exit 1
            fi
          done

      - name: Connect to Tailnet
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:cicd

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HOST_IP }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail
            cd ~/meoxp-bot

            export TAG=meoxpbot
            echo "Starting deployment for tag: $TAG"

            git pull origin main

            echo "Building new images..."
            docker compose build

            echo "Restarting containers..."
            docker compose down --remove-orphans
            docker compose up -d

            echo "Pruning dangling images..."
            docker image prune -f --filter "dangling=true"

            echo "Verifying containers running..."
            docker compose ps

            echo "Deployment complete for tag: $TAG"
