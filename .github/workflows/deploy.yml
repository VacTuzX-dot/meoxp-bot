name: Deploy meoxp-bot

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install Dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build and Typecheck
        run: pnpm run build

      # Since 'npm test' doesn't exist yet, we only run build/typecheck as our QA checks per project constraints.

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Connect to Tailnet
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:cicd

      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST_IP }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/meoxp-bot
            # Fetch latest code
            git pull origin main
            
            # Generate deployment tag from short commit SHA
            DEPLOY_TAG=$(git rev-parse --short HEAD)
            echo "Starting deployment for tag: $DEPLOY_TAG"
            
            # 1. Identify and stop old containers for this project
            # This ensures a clean slate as requested
            echo "Identifying old project containers..."
            old_containers=$(docker ps -a -q --filter "label=com.meoxp.bot.project=meoxp-bot")
            if [ ! -z "$old_containers" ]; then
              echo "Stopping and removing old containers: $old_containers"
              docker stop $old_containers || true
              docker rm $old_containers || true
            else
              echo "No old containers found."
            fi
            
            # 2. Redeploy with the new tag
            # Using --force-recreate and --build as requested
            export TAG=$DEPLOY_TAG
            docker compose up -d --force-recreate --build
            
            # 3. Tag the newly built images as 'latest' for stability/traceability
            docker tag meoxp-bot:$TAG meoxp-bot:latest
            docker tag meoxp-dashboard:$TAG meoxp-dashboard:latest
            
            # 4. Cleanup old/dangling images safely
            # Only removes dangling images related to this project
            echo "Pruning dangling project images..."
            docker image prune -f --filter "label=com.meoxp.bot.project=meoxp-bot"
            
            echo "Deployment completed successfully for tag: $DEPLOY_TAG"
